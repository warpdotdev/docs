version: 0.1
cli:
  version: 1.10.0
plugins:
  sources:
    - id: trunk
      ref: v0.0.17
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - git-diff-check
    - prettier
    - prettier@2.8.7
  enabled:
    - markdownlint@0.43.0
    - oxipng@9.1.4
    - yamllint@1.35.1
    - gitleaks@8.30.1
runtimes:
  enabled:
    - python@3.12.5
    - go@1.23.4
    - node@22.13.0
actions:
  enabled:
    - git-lfs
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
