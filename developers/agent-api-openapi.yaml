            - PLAN
          description: Type of the artifact
        created_at:
          type: string
          format: date-time
          description: Timestamp when the artifact was created (RFC3339)
        data:
          $ref: '#/components/schemas/PlanArtifactData'

    PullRequestArtifact:
      type: object
      required:
        - artifact_type
        - created_at
        - data
      properties:
        artifact_type:
          type: string
          enum:
            - PULL_REQUEST
          description: Type of the artifact
        created_at:
          type: string
          format: date-time
          description: Timestamp when the artifact was created (RFC3339)
        data:
          $ref: '#/components/schemas/PullRequestArtifactData'

    ScreenshotArtifact:
      type: object
      required:
        - artifact_type
        - created_at
        - data
      properties:
        artifact_type:
          type: string
